<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مدري</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-content">
                <h1 class="logo">مدري<span></span></h1>
                <p class="tagline">والله ما ادري ايش اسمي الموقع.</p>
            </div>
        </header>

        <div class="search-wrapper" id="searchWrapper">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن فيلم، مسلسل، أو أنمي..." autocomplete="off">
                <button id="searchBtn" class="search-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="10" cy="10" r="7"></circle>
                        <line x1="21" y1="21" x2="15" y2="15"></line>
                    </svg>
                    بحث
                </button>
            </div>
        </div>

        <main class="main-content">
            <div id="resultsContainer" class="results-container">
                <div class="results-header">
                    <h3>نتائج البحث</h3>
                    <span id="resultsCount" class="results-count"></span>
                </div>
                <div id="resultsArea" class="results-grid"></div>
            </div>

            <div id="detailsContainer" class="details-container" style="display: none;">
                <button id="backToResultsBtn" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    العودة للنتائج
                </button>
                <div id="detailsArea"></div>
            </div>
        </main>

        <footer class="footer">
            <p>المطور: M7mod</p>
            </p>Discord: _.m6
            </p>Instagram: @LiM7mod</p>
            </p>ملاحظة: اتمنى تسوي Fork للموقع على حسابك الخاص وتستعمله</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
